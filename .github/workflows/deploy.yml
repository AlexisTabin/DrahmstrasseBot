name: Deploy Telegram Bot to Lambda

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'infra/**'
      - '*.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'infra/**'
      - '*.md'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Lint code with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Run unit tests
        run: |
          pytest --cov=src --cov-report=xml --maxfail=1 --disable-warnings -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Install dependencies into package
        run: |
          pip install -r requirements.txt -t package/

      - name: Copy bot files
        run: |
          cp -r src/ package/

      - name: Package Lambda function
        run: |
          cd package
          zip -r ../function.zip .

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy Lambda
        if: github.event_name == 'push'
        run: |
          aws lambda update-function-code \
            --function-name drahmsstrasseTelegramBot \
            --zip-file fileb://function.zip

      - name: Wait for Lambda update
        if: github.event_name == 'push'
        run: aws lambda wait function-updated --function-name drahmsstrasseTelegramBot

      - name: Smoke test EventBridge payloads
        if: github.event_name == 'push'
        run: |
          DEV_CHAT_ID=-4867763410
          COMMANDS=(
            "/whoishere@DrahmstrasseBot"
            "/roles"
            "/papier@DrahmstrasseBot"
            "/carton@DrahmstrasseBot"
            "/reminder@DrahmstrasseBot"
            "/recap@DrahmstrasseBot"
          )
          FAILED=0

          for CMD in "${COMMANDS[@]}"; do
            LEN=${#CMD}
            PAYLOAD=$(jq -n \
              --arg cmd "$CMD" \
              --argjson len "$LEN" \
              --argjson chat "$DEV_CHAT_ID" \
              '{body: ({message: {chat: {id: $chat}, text: $cmd, entities: [{type: "bot_command", offset: 0, length: $len}]}} | tostring)}')

            echo "=== Testing $CMD ==="

            RESPONSE=$(aws lambda invoke \
              --function-name drahmsstrasseTelegramBot \
              --payload "$PAYLOAD" \
              --log-type Tail \
              --cli-binary-format raw-in-base64-out \
              /dev/stdout 2>/dev/null)

            LOG_RESULT=$(echo "$RESPONSE" | grep -o '"LogResult": "[^"]*"' | cut -d'"' -f4)
            LOGS=$(echo "$LOG_RESULT" | base64 --decode)

            echo "$LOGS"

            if echo "$LOGS" | grep -q "Telebot deserialization succeeded"; then
              echo "PASSED: $CMD"
            else
              echo "FAILED: $CMD"
              FAILED=1
            fi
            echo ""
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "Smoke test FAILED: one or more EventBridge commands failed deserialization"
            echo "Check src/main.py field injection against current telebot requirements."
            exit 1
          fi

          echo "All smoke tests PASSED"
