name: Deploy Telegram Bot to Lambda

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'infra/**'
      - '*.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'infra/**'
      - '*.md'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Lint code with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Run unit tests
        run: |
          pytest --cov=src --cov-report=xml --maxfail=1 --disable-warnings -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Install dependencies into package
        run: |
          pip install -r requirements.txt -t package/

      - name: Copy bot files
        run: |
          cp -r src/ package/

      - name: Package Lambda function
        run: |
          cd package
          zip -r ../function.zip .

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy Lambda
        if: github.event_name == 'push'
        run: |
          aws lambda update-function-code \
            --function-name drahmsstrasseTelegramBot \
            --zip-file fileb://function.zip

      - name: Wait for Lambda update
        if: github.event_name == 'push'
        run: aws lambda wait function-updated --function-name drahmsstrasseTelegramBot

      - name: Smoke test EventBridge payloads
        if: github.event_name == 'push'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          DEV_CHAT_ID=-4867763410
          TG="https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage"

          send_tg() {
            curl -s -X POST "$TG" \
              -d chat_id="$DEV_CHAT_ID" \
              -d parse_mode=HTML \
              -d text="$1" > /dev/null
          }

          LAMBDA_ARN=$(aws lambda get-function \
            --function-name drahmsstrasseTelegramBot \
            --query 'Configuration.FunctionArn' --output text)

          RULES=$(aws events list-rule-names-by-target \
            --target-arn "$LAMBDA_ARN" --query 'RuleNames' --output json)

          COUNT=$(echo "$RULES" | jq 'length')
          echo "Found $COUNT EventBridge rules targeting the Lambda"

          if [ "$COUNT" -eq 0 ]; then
            echo "No EventBridge rules found — skipping smoke test"
            exit 0
          fi

          COMMANDS=$(echo "$RULES" | jq -r '.[]' | paste -sd', ')
          send_tg "🧪 <b>Smoke testing $COUNT EventBridge commands...</b>"$'\n'"$COMMANDS"

          FAILED=0

          RESULT_FILE=$(mktemp)

          for RULE in $(echo "$RULES" | jq -r '.[]'); do
            INPUT=$(aws events list-targets-by-rule \
              --rule "$RULE" \
              --query "Targets[?Arn==\`$LAMBDA_ARN\`].Input | [0]" \
              --output text)

            # Swap chat ID to dev chat so smoke tests don't post to prod
            PAYLOAD=$(echo "$INPUT" | jq --argjson dev "$DEV_CHAT_ID" \
              '.body = (.body | fromjson | .message.chat.id = $dev | tojson)')

            CMD=$(echo "$INPUT" | jq -r '.body | fromjson | .message.text')
            echo "=== Testing $RULE ($CMD) ==="

            INVOKE_META=$(aws lambda invoke \
              --function-name drahmsstrasseTelegramBot \
              --payload "$PAYLOAD" \
              --log-type Tail \
              --cli-binary-format raw-in-base64-out \
              "$RESULT_FILE")

            # Show logs for debugging (last 4KB only, may be truncated)
            LOG_RESULT=$(echo "$INVOKE_META" | jq -r '.LogResult // empty')
            if [ -n "$LOG_RESULT" ]; then
              echo "$LOG_RESULT" | base64 --decode
            fi

            # Check for Lambda-level errors and response status
            FUNC_ERROR=$(echo "$INVOKE_META" | jq -r '.FunctionError // empty')
            STATUS=$(jq -r '.statusCode' "$RESULT_FILE" 2>/dev/null)

            if [ -n "$FUNC_ERROR" ]; then
              echo "FAILED: $RULE (FunctionError: $FUNC_ERROR)"
              FAILED=1
            elif [ "$STATUS" != "200" ]; then
              echo "FAILED: $RULE (statusCode: $STATUS)"
              FAILED=1
            else
              echo "PASSED: $RULE"
            fi
            echo ""
          done

          rm -f "$RESULT_FILE"

          if [ "$FAILED" -eq 1 ]; then
            send_tg "❌ <b>Smoke test FAILED</b> — one or more EventBridge commands didn't pass"
            exit 1
          fi

          send_tg "✅ <b>All $COUNT smoke tests passed!</b> Deploy complete."
          echo "All $COUNT smoke tests PASSED"
